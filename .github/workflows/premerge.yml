name: Pre-Merge Contract

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: premerge-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate repository contract
    runs-on: ubuntu-24.04
    steps:
      - name: Provision pinned Phase 5 public trust registry
        id: phase5-trust
        env:
          PHASE5_TRUSTED_OWNER_REGISTRY_BASE64: ${{ vars.PHASE5_TRUSTED_OWNER_REGISTRY_BASE64 }}
        run: |
          [[ -n "${PHASE5_TRUSTED_OWNER_REGISTRY_BASE64:-}" ]] || {
            echo "PHASE5_TRUSTED_OWNER_REGISTRY_BASE64 repository variable is required" >&2
            exit 1
          }
          umask 077
          registry="$(mktemp "$RUNNER_TEMP/phase5-trusted-owner-registry.XXXXXX.json")"
          case "$registry" in
            "$RUNNER_TEMP"/*) ;;
            *) echo "Phase 5 trust registry escaped runner.temp" >&2; exit 1 ;;
          esac
          case "$registry" in
            "$GITHUB_WORKSPACE"|"$GITHUB_WORKSPACE"/*)
              echo "Phase 5 trust registry entered the candidate checkout" >&2
              exit 1
              ;;
          esac
          printf '%s' "$PHASE5_TRUSTED_OWNER_REGISTRY_BASE64" | base64 --decode > "$registry" || {
            echo "PHASE5_TRUSTED_OWNER_REGISTRY_BASE64 is not valid base64" >&2
            exit 1
          }
          expected_digest="f55a117eb20df727ee21cb922345d62bce3f3afc4458ba5a8b057dc430c9bb6d"
          actual_digest="$(sha256sum "$registry" | awk '{print $1}')"
          [[ "$actual_digest" == "$expected_digest" ]] || {
            echo "Phase 5 trust registry digest mismatch" >&2
            exit 1
          }
          echo "registry=$registry" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq ripgrep sqlite3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run pre-merge contract
        env:
          HARNESS_PHASE5_TRUSTED_OWNER_REGISTRY: ${{ steps.phase5-trust.outputs.registry }}
          HARNESS_PHASE5_TRUSTED_OWNER_REGISTRY_SHA256: f55a117eb20df727ee21cb922345d62bce3f3afc4458ba5a8b057dc430c9bb6d
        run: scripts/validate-premerge.sh

      - name: Prove Linux initial-to-candidate upgrade
        run: |
          tests/release/download-v0.1.14-artifact.sh \
            harness-cli-linux-x64 dist/us092-harness-cli-linux-x64
          candidate_ref="$(awk 'NF && $1 !~ /^#/ {print $1; exit}' scripts/harness-cli-release-tag)"
          tests/installer/test-cli-upgrade-candidate.sh \
            dist/us092-harness-cli-linux-x64 \
            target/debug/harness-cli \
            harness-cli-linux-x64 \
            "$candidate_ref"

  windows-installer:
    name: Validate Windows installer contract
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows Harness CLI
        run: cargo build -p harness-cli --locked

      - name: Download pinned Windows initial protocol artifact
        shell: bash
        run: |
          tests/release/download-v0.1.14-artifact.sh \
            harness-cli-windows-x64.exe dist/us092-harness-cli-windows-x64.exe

      - name: Run PowerShell installer modes and upgrade transition
        shell: pwsh
        run: |
          $candidateRef = (Get-Content scripts/harness-cli-release-tag | Select-Object -First 1).Trim()
          tests/installer/test-install-harness-modes.ps1 `
            -CandidateArtifact target/debug/harness-cli.exe `
            -InitialArtifact dist/us092-harness-cli-windows-x64.exe `
            -CandidateRef $candidateRef
